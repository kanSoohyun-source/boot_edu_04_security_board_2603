spring.application.name=boot_edu_01_board_2603

# DB setting
#spring.datasource.driver-class-name=org.mariadb.jdbc.Driver # it can be omitted (can infer using DB by under 3 things)
spring.datasource.url=jdbc:mariadb://localhost:3306/boot_edu_01_board_2603
spring.datasource.username=root
spring.datasource.password=6800

# log4j2 setting
logging.level.org.springframework=info
logging.level.boot_edu_01_board_2603=debug

# spring security logging config
logging.level.org.springframework.security=trace

# logging pattern
logging.pattern.console=%clr(%-5level){green} %clr(%logger{36}.%M\\(\\)){cyan}: %msg%n

# JPA config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true