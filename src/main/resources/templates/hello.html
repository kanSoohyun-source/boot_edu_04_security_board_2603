<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1 th:text="${message}"></h1>

    <!--/*<h4>[[${list}]]</h4>*/-->

    <div th:with="num1 = ${10}, num2 = ${20}">
        <h4 th:text="${num1}"></h4>
        <h4 th:text="${num1 + num2}"></h4>
    </div>

    <!--/* num1은 div 태그 내 임시 변수이기 때문에 태그를 빠져나오면 값이 찍히지 않음 */-->
    <h4 th:text="${num1}"></h4>

    <!--/* thymeleaf 에러 발생시킴 (없는 변수 2개를 이용해 연산 처리를 요구했으므로) */-->
    <h4 th:text="${num1 + num2}"></h4>

</body>
</html>
