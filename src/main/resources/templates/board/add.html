<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/basic.html}">
<head>
    <meta charset="UTF-8">
    <title>Board List</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row mt-3">
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        Board Add
                    </div>
                    <div class="card-body">
                        <div class="card-body">
                            <form action="/board/add" method="post">
                                <div class="input-group mb-3">
                                    <span class="input-group-text">Title</span>
                                    <input type="text" name="title" class="form-control" placeholder="Title">
                                </div>

                                <div class="input-group mb-3">
                                    <span class="input-group-text">Content</span>
                                    <textarea class="form-control col-sm-5" rows="5" name="content"></textarea>
                                </div>

                                <div class="input-group mb-3">
                                    <span class="input-group-text">Writer</span>
                                    <input type="text" name="writer" class="form-control" placeholder="Writer"
                                    th:value="${#authentication.principal.username}">
                                </div>

                                <div class="my-4">
                                    <div class="float-end">
                                        <button type="submit" class="btn btn-primary">Submit</button>
                                        <button type="reset" class="btn btn-secondary">Reset</button>
                                    </div>
                                </div>
                            </form>
                        </div><!-- end card body -->
                    </div><!-- end card body -->
                </div><!-- end card -->
            </div><!-- end col -->
        </div><!-- end row -->

        <style>
            .ck-editor__editable_inline {
                min-height: 300px; /* 세로 크기 조정 */
                max-height: 500px;
                height: 400px;
            }
            .ck-editor {
                width: 100%; /* 가로 크기 조정 */
            }
            .ck-reset_all :not(.ck-reset_all-excluded *), .ck.ck-reset, .ck.ck-reset_all {
                width: 100%; /* 에디터의 가로 크기를 100%로 설정 */
                max-width: 800px;
            }

        </style>
    </div>

<script layout:fragment="script" th:inline="javascript">
    /* JS 에서 인증 정보를 보는 법 */
    // "현재 로그인한 사용자의 정보를 자바스크립트 변수에 담아라"라는 뜻
    const auth = [[${#authentication.principal}]];

    const errors = [[${errors}]]
    console.log(errors)

    let errorsMessage = ''
    if (errors) {
        for (let i = 0; i < errors.length; i++) {
            errorsMessage += `${errors[i].field}는(은)${errors[i].code} \n`
        }
        alert(errorsMessage)
    }

    ClassicEditor
        .create(document.querySelector('textarea[name=content]'), {
            ckfinder: {
                uploadUrl: '/api/upload/editor', // Spring Boot에서 처리할 URL
            }
        })
        .catch(error => {
            console.error(error);
        });

</script>
</body>
</html>
