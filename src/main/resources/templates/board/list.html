<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/basic.html}">
<head>
    <meta charset="UTF-8">
    <title>Board List</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row mt-3">
            <form action="/board/list" method="get">
                <div class="col">
                    <input type="hidden" name="size" th:value="${pageRequestDTO.size}">
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <select class="form-select" name="type">
                                <option value="">---</option>
                                <option value="t" th:selected="${pageRequestDTO.type =='t'}">제목</option>
                                <option value="c" th:selected="${pageRequestDTO.type =='c'}">내용</option>
                                <option value="w" th:selected="${pageRequestDTO.type =='w'}">작성자</option>
                                <option value="tc" th:selected="${pageRequestDTO.type =='tc'}">제목 내용</option>
                                <option value="tcw" th:selected="${pageRequestDTO.type =='tcw'}">제목 내용 작성자</option>
                            </select>
                        </div>
                        <input type="text" class="form-control" name="keyword" th:value="${pageRequestDTO.keyword}">
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary searchBtn" type="submit">Search</button>
                            <button class="btn btn-outline-secondary clearBtn" type="button">Clear</button>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="col">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title">Board List</h5>
                    <p>총 게시물 [[${pageResponseDTO.total}]]개</p>

                    <table class="table">
                        <thead>
                        <tr>
                            <th class="col">Bno</th>
                            <th class="col">Title</th>
                            <th class="col">Writer</th>
                            <th class="col">RegDate</th>
                        </tr>
                        </thead>

                        <tbody th:with="link = ${pageRequestDTO.getLink()}">
                        <tr th:each="dto, status:${pageResponseDTO.dtoList}">
                            <td th:text="${pageResponseDTO.total - ((pageResponseDTO.page - 1) * pageResponseDTO.size) - status.index}"></td>
                            <td><a th:href="|@{/board/read(bno=${dto.bno})}&${link}|">[[${dto.title}]]</a></td>
                            <td>[[${dto.writer}]]</td>
                            <td>[[${#strings.substring(dto.regDate, 0, 10)}]]</td>
                        </tr>
                        </tbody>
                    </table>
                    <div class="float-end">
                        <ul class="pagination flex-wrap">
                            <li th:class="page-item" th:if="${pageResponseDTO.prev}">
                                <a class="page-link" th:data-num="${pageResponseDTO.start - 1}">Prev</a>
                            </li>

                            <th:block th:each="i: ${#numbers.sequence(pageResponseDTO.start, pageResponseDTO.end)}">
                                <li th:class="${pageResponseDTO.page == i} ? 'page-item active' : 'page-item'">
                                    <a class="page-link" th:data-num="${i}">[[${i}]]</a>
                                </li>
                            </th:block>

                            <li th:class="page-item" th:if="${pageResponseDTO.next}">
                                <a class="page-link" th:data-num="${pageResponseDTO.end + 1}">Next</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Modal title</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p>Modal body text goes here.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary">Save changes</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script layout:fragment="script" th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelector('.pagination').addEventListener('click', function (evt) {
            // 페이지 번호를 클릭하면 검색 창에 있는 <form> 태그에 <input type='hidden'>으로 page를 추가한 후 submit
            evt.preventDefault();
            const target = evt.target;
            console.log(target);

            if (target.tagName !== 'A') {
                return;
            }

            // 이동할 페이지 번호 들고 오기
            const pageNum = target.getAttribute('data-num');
            console.log(pageNum);

            // 폼 태그 들고와 폼에 페이지 번호 추가
            const frm = document.querySelector('form');
            frm.innerHTML += `<input type="hidden" name="page" value="${pageNum}">`;
            console.log(frm);
            frm.submit();
        })
    })

    // show modal
    const result = [[${result}]]
    const modal = new bootstrap.Modal(document.querySelector('.modal'))

    if (result) {
        // alert(result)
        modal.show()
    }
</script>
</body>
</html>
